<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>捷安商品庫存查詢 · Home Desyne</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@500;600;700&display=swap" rel="stylesheet" />

<style>
  :root {
    /* 暖調中性底色，貼近 Home Desyne 溫潤質感 */
    --paper:        #efece5;
    --paper-2:      #f6f4ef;
    --ink:          #262a2c;
    --muted:        #8b857b;
    --line:         rgba(38, 42, 44, 0.10);
    --line-strong:  rgba(38, 42, 44, 0.16);

    --accent:       #35635a;   /* 沉靜墨綠 */
    --accent-dark:  #274a43;
    --accent-soft:  rgba(53, 99, 90, 0.10);

    --warn:         #b0791f;   /* 低庫存 · 琥珀 */
    --warn-soft:    #f4ecdb;
    --danger:       #a3493d;   /* 缺貨 · 磚紅 */
    --danger-soft:  #f2e2df;

    /* 磨砂玻璃 */
    --glass:        rgba(255, 255, 255, 0.55);
    --glass-strong: rgba(255, 255, 255, 0.74);
    --glass-line:   rgba(255, 255, 255, 0.65);
    --blur:         18px;
    --shadow:       0 18px 48px -22px rgba(38, 42, 44, 0.32);

    --mono: ui-monospace, "SF Mono", "Roboto Mono", "Noto Sans Mono", monospace;
    --sans: "Noto Sans TC", -apple-system, "Segoe UI", system-ui, sans-serif;
    --serif: "Noto Serif TC", "Songti TC", Georgia, serif;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; }

  body {
    font-family: var(--sans);
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 18px 72px;
    -webkit-font-smoothing: antialiased;
    position: relative;
    overflow-x: hidden;
  }

  /* 柔和背景光暈 + 織品直紋，讓磨砂玻璃有內容可透 */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: -2;
    background:
      radial-gradient(60% 45% at 18% 8%,  rgba(53, 99, 90, 0.14), transparent 70%),
      radial-gradient(55% 40% at 92% 22%, rgba(176, 121, 31, 0.12), transparent 70%),
      radial-gradient(70% 55% at 50% 108%, rgba(53, 99, 90, 0.10), transparent 70%),
      var(--paper);
  }
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    z-index: -1;
    background-image: repeating-linear-gradient(
      90deg,
      rgba(38, 42, 44, 0.018) 0px,
      rgba(38, 42, 44, 0.018) 1px,
      transparent 1px,
      transparent 7px
    );
    pointer-events: none;
  }

  .wrap { width: 100%; max-width: 540px; }

  /* ── 標題 ─────────────────────────────── */
  header {
    margin-bottom: 26px;
    animation: rise .6s cubic-bezier(.22,.61,.36,1) both;
  }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--sans);
    font-size: 11.5px; letter-spacing: 0.26em; text-transform: uppercase;
    color: var(--accent); font-weight: 700; margin: 0 0 12px;
  }
  .eyebrow::before {
    content: ""; width: 22px; height: 1.5px;
    background: currentColor; border-radius: 2px; opacity: .7;
  }
  h1 {
    font-family: var(--serif);
    font-size: 30px; margin: 0; font-weight: 700;
    letter-spacing: 0.01em; line-height: 1.2;
  }
  .sub { color: var(--muted); font-size: 14.5px; margin: 10px 0 0; line-height: 1.6; }

  /* ── 搜尋列 ───────────────────────────── */
  .search {
    display: flex; gap: 10px; margin-bottom: 22px;
    animation: rise .6s cubic-bezier(.22,.61,.36,1) .06s both;
  }
  .search input {
    flex: 1; font-family: var(--mono); font-size: 17px;
    padding: 15px 18px;
    border: 1px solid var(--glass-line);
    border-radius: 14px;
    background: var(--glass-strong);
    -webkit-backdrop-filter: blur(var(--blur));
    backdrop-filter: blur(var(--blur));
    color: var(--ink); outline: none;
    box-shadow: var(--shadow);
    transition: border-color .18s, box-shadow .18s, transform .18s;
  }
  .search input::placeholder { color: var(--muted); font-family: var(--sans); }
  .search input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft), var(--shadow);
  }
  .search button {
    font-family: var(--sans); font-size: 15px; font-weight: 700;
    letter-spacing: .04em;
    padding: 0 26px; border: none; border-radius: 14px;
    background: var(--accent); color: #fff; cursor: pointer;
    box-shadow: 0 12px 26px -12px rgba(53, 99, 90, 0.7);
    transition: background .18s, transform .12s, box-shadow .18s;
  }
  .search button:hover { background: var(--accent-dark); transform: translateY(-1px); }
  .search button:active { transform: translateY(0); }
  .search button:disabled { opacity: .5; cursor: default; transform: none; }

  /* ── QR 區塊 ──────────────────────────── */
  #qrArea:not(:empty) { margin-bottom: 22px; }
  .qr-card {
    background: var(--glass);
    -webkit-backdrop-filter: blur(var(--blur));
    backdrop-filter: blur(var(--blur));
    border: 1px solid var(--glass-line);
    border-radius: 20px;
    box-shadow: var(--shadow);
    padding: 22px;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    animation: qrIn .55s cubic-bezier(.22,.61,.36,1) both;
  }
  .qr-box {
    width: 220px; height: 220px;
    padding: 14px; border-radius: 16px;
    background: #fff;
    box-shadow: inset 0 0 0 1px var(--line);
  }
  .qr-box canvas, .qr-box svg {
    width: 220px !important; height: 220px !important;
    border-radius: 8px; background: #fff; display: block;
  }
  .qr-label {
    font-family: var(--mono); font-size: 13px; color: var(--muted);
    letter-spacing: .02em; text-align: center; word-break: break-all;
  }
  .qr-dl {
    font-family: var(--sans); font-size: 13px; font-weight: 700;
    letter-spacing: .03em;
    color: var(--accent); background: rgba(255,255,255,0.5);
    border: 1px solid var(--line-strong); border-radius: 11px;
    padding: 10px 20px; cursor: pointer;
    transition: border-color .18s, color .18s, background .18s, transform .12s;
  }
  .qr-dl:hover { border-color: var(--accent); background: var(--accent-soft); transform: translateY(-1px); }

  /* ── 結果面板 ─────────────────────────── */
  .panel {
    background: var(--glass);
    -webkit-backdrop-filter: blur(var(--blur));
    backdrop-filter: blur(var(--blur));
    border: 1px solid var(--glass-line);
    border-radius: 22px;
    box-shadow: var(--shadow);
    overflow: hidden;
    min-height: 132px;
  }

  .result { padding: 0; animation: rise .5s cubic-bezier(.22,.61,.36,1) both; }
  .result > * { animation: rise .5s cubic-bezier(.22,.61,.36,1) both; }
  .result > *:nth-child(1) { animation-delay: .02s; }
  .result > *:nth-child(2) { animation-delay: .08s; }
  .result > *:nth-child(3) { animation-delay: .13s; }
  .result > *:nth-child(4) { animation-delay: .18s; }
  .result > *:nth-child(5) { animation-delay: .23s; }

  .r-img {
    width: 100%;
    background: linear-gradient(160deg, #f3f1ec, #e9e6df);
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    min-height: 200px; max-height: 320px; overflow: hidden;
  }
  .r-img img {
    width: 100%; height: 100%; max-height: 320px;
    object-fit: contain; display: block;
  }
  .r-head {
    padding: 20px 24px 0;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .r-code {
    font-family: var(--mono); font-size: 14px; color: var(--muted);
    letter-spacing: 0.04em;
    padding: 5px 12px; border-radius: 999px;
    background: rgba(38,42,44,0.05);
  }
  .r-name {
    font-family: var(--serif);
    font-size: 23px; font-weight: 700; line-height: 1.35;
    padding: 16px 24px 2px; letter-spacing: .01em;
  }
  .r-qtyrow {
    display: flex; align-items: baseline; gap: 12px; padding: 8px 24px 26px;
  }
  .r-qty {
    font-family: var(--mono); font-size: 48px; font-weight: 700;
    line-height: 1; letter-spacing: -0.02em;
  }
  .r-qty.low  { color: var(--warn); }
  .r-qty.zero { color: var(--danger); }
  .r-unit { color: var(--muted); font-size: 15px; }

  .tag {
    font-size: 11px; font-weight: 700; letter-spacing: .1em;
    padding: 6px 12px; border-radius: 999px; align-self: center;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .tag::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .tag.low  { background: var(--warn-soft);  color: var(--warn); }
  .tag.zero { background: var(--danger-soft); color: var(--danger); }

  /* ── 庫存調整區 ───────────────────────── */
  .qty-editor { border-top: 1px solid var(--line); padding: 18px 24px 22px; }

  .stepper {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 8px; margin-top: 4px;
  }
  .stepper button {
    font-family: var(--mono); font-size: 16px; font-weight: 700;
    color: var(--accent); background: rgba(255,255,255,0.5);
    border: 1px solid var(--line-strong); border-radius: 12px;
    padding: 12px 0; cursor: pointer;
    transition: border-color .15s, background .15s, transform .1s, color .15s;
    -webkit-user-select: none; user-select: none;
  }
  .stepper button:hover  { border-color: var(--accent); background: var(--accent-soft); }
  .stepper button:active { transform: translateY(1px); }
  .stepper button.minus  { color: var(--danger); }
  .stepper button.minus:hover { border-color: var(--danger); background: var(--danger-soft); }

  /* 變化提示：原本 X → 調整後 Y */
  .change-note {
    margin-top: 14px; font-size: 14px; line-height: 1.6; color: var(--muted);
    display: none;
  }
  .change-note.show { display: block; animation: rise .3s ease both; }
  .change-note .from { font-family: var(--mono); color: var(--ink); font-weight: 700; }
  .change-note .arrow { margin: 0 8px; color: var(--muted); }
  .change-note .to {
    font-family: var(--mono); font-weight: 700; color: var(--accent);
    padding: 2px 10px; border-radius: 8px; background: var(--accent-soft);
  }
  .change-note .to.up   { color: var(--accent); background: var(--accent-soft); }
  .change-note .to.down { color: var(--danger); background: var(--danger-soft); }
  .change-note .delta { font-family: var(--mono); font-size: 13px; margin-left: 8px; }

  /* 存檔 / 還原 按鈕列 */
  .save-row { display: none; gap: 8px; margin-top: 14px; }
  .save-row.show { display: flex; }
  .save-row button {
    flex: 1; font-family: var(--sans); font-size: 15px; font-weight: 700;
    letter-spacing: .04em; border-radius: 12px; padding: 13px 0; cursor: pointer;
    transition: filter .15s, background .15s, border-color .15s, transform .1s;
  }
  .save-row button:active { transform: translateY(1px); }
  .save-btn  { flex: 2 !important; color: #fff; background: var(--accent); border: 1px solid var(--accent-dark); }
  .save-btn:hover { filter: brightness(1.06); }
  .save-btn:disabled { opacity: .45; cursor: not-allowed; filter: none; }
  .reset-btn { color: var(--muted); background: rgba(255,255,255,0.5); border: 1px solid var(--line-strong); }
  .reset-btn:hover { border-color: var(--ink); color: var(--ink); }

  /* 存檔前的確認提醒 */
  .save-confirm {
    display: none; margin-top: 14px; padding: 14px 16px;
    border: 1px solid var(--line-strong); border-radius: 14px;
    background: var(--warn-soft);
  }
  .save-confirm.show { display: block; animation: rise .28s ease both; }
  .save-confirm .msg { font-size: 14px; line-height: 1.6; color: var(--ink); }
  .save-confirm .msg b { font-family: var(--mono); }
  .save-confirm-row { display: flex; gap: 8px; margin-top: 12px; }
  .save-confirm-row button {
    flex: 1; font-family: var(--sans); font-size: 14.5px; font-weight: 700;
    border-radius: 11px; padding: 11px 0; cursor: pointer; transition: filter .15s, background .15s, border-color .15s;
  }
  .confirm-yes { color: #fff; background: var(--accent); border: 1px solid var(--accent-dark); }
  .confirm-yes:hover { filter: brightness(1.06); }
  .confirm-yes:disabled { opacity: .5; cursor: progress; }
  .confirm-no  { color: var(--muted); background: rgba(255,255,255,0.6); border: 1px solid var(--line-strong); }
  .confirm-no:hover { border-color: var(--ink); color: var(--ink); }

  /* 存檔結果狀態列 */
  .save-status { margin-top: 12px; font-size: 13.5px; line-height: 1.5; min-height: 18px; display: none; }
  .save-status.show { display: block; animation: rise .28s ease both; }
  .save-status.ok  { color: var(--accent); font-weight: 700; }
  .save-status.err { color: var(--danger); font-weight: 700; }

  /* ── 狀態 (空 / 載入 / 錯誤) ──────────── */
  .state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 46px 24px; color: var(--muted);
    min-height: 132px; gap: 10px;
    animation: rise .45s cubic-bezier(.22,.61,.36,1) both;
  }
  .state .big { font-size: 15.5px; color: var(--ink); font-weight: 700; }
  .state .icon {
    font-size: 26px; opacity: .55; font-weight: 300;
    width: 54px; height: 54px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: rgba(38,42,44,0.05); margin-bottom: 2px;
  }
  .state.error { color: var(--danger); }
  .state.error .big { color: var(--danger); }
  .state.error .icon { background: var(--danger-soft); color: var(--danger); opacity: 1; }

  .spinner {
    width: 26px; height: 26px; border: 2.5px solid var(--line-strong);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .7s linear infinite;
  }

  /* ── 多筆提醒 ─────────────────────────── */
  .multi {
    border-top: 1px solid var(--line); padding: 16px 24px 20px;
    font-size: 13px; color: var(--muted); line-height: 1.7;
    background: rgba(176, 121, 31, 0.05);
  }
  .multi b { color: var(--warn); }
  .multi ul { margin: 8px 0 0; padding-left: 18px; }
  .multi li { margin: 4px 0; font-family: var(--mono); color: var(--ink); }

  footer {
    margin-top: 22px; font-size: 12px; color: var(--muted); text-align: center;
    letter-spacing: .02em;
    animation: rise .6s cubic-bezier(.22,.61,.36,1) .12s both;
  }

  /* ── 動畫 ─────────────────────────────── */
  @keyframes rise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
  @keyframes qrIn { from { opacity: 0; transform: translateY(14px) scale(.97); } to { opacity: 1; transform: none; } }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .001s !important; }
    .spinner { animation: spin .7s linear infinite !important; }
  }

  @media (max-width: 480px) {
    body { padding: 28px 14px 56px; }
    h1 { font-size: 26px; }
    .search input { font-size: 16px; }
  }

  /* ── 掃描按鈕 + 相機彈窗 ──────────────── */
  .scan-btn {
    flex: 0 0 auto;
    display: inline-flex; align-items: center; justify-content: center;
    width: 54px; border: 1px solid var(--glass-line); border-radius: 14px;
    background: var(--glass-strong);
    -webkit-backdrop-filter: blur(var(--blur)); backdrop-filter: blur(var(--blur));
    color: var(--accent); cursor: pointer; box-shadow: var(--shadow);
    transition: border-color .18s, color .18s, transform .12s, background .18s;
  }
  .scan-btn:hover { border-color: var(--accent); background: var(--accent-soft); transform: translateY(-1px); }
  .scan-btn:active { transform: translateY(0); }
  .scan-btn svg { width: 24px; height: 24px; }

  .scan-modal {
    position: fixed; inset: 0; z-index: 50;
    display: none; align-items: center; justify-content: center;
    padding: 20px;
    background: rgba(30, 33, 34, 0.55);
    -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
  }
  .scan-modal.open { display: flex; animation: rise .28s ease both; }
  .scan-sheet {
    width: 100%; max-width: 380px;
    background: var(--glass-strong);
    -webkit-backdrop-filter: blur(var(--blur)); backdrop-filter: blur(var(--blur));
    border: 1px solid var(--glass-line); border-radius: 22px;
    box-shadow: var(--shadow); padding: 16px;
  }
  .scan-head {
    display: flex; align-items: center; justify-content: space-between;
    font-family: var(--serif); font-weight: 700; font-size: 17px;
    padding: 2px 2px 12px; color: var(--ink);
  }
  .scan-close {
    border: none; background: rgba(38,42,44,0.06); color: var(--ink);
    width: 32px; height: 32px; border-radius: 10px; cursor: pointer; font-size: 14px;
  }
  .scan-close:hover { background: rgba(38,42,44,0.12); }
  .scan-reader {
    width: 100%; border-radius: 16px; overflow: hidden; background: #000;
    aspect-ratio: 1 / 1;
  }
  .scan-reader video { width: 100% !important; height: 100% !important; object-fit: cover; display: block; }
  .scan-reader img[alt="Info icon"], .scan-reader { border: none; }
  .scan-status {
    margin-top: 12px; text-align: center; font-size: 13.5px; color: var(--muted);
    min-height: 20px; line-height: 1.5;
  }
  .scan-status.err { color: var(--danger); }
  .scan-manual {
    margin-top: 12px; width: 100%;
    font-family: var(--sans); font-size: 14px; font-weight: 700;
    color: var(--accent); background: rgba(255,255,255,0.5);
    border: 1px solid var(--line-strong); border-radius: 12px;
    padding: 11px; cursor: pointer; transition: background .18s, border-color .18s;
  }
  .scan-manual:hover { background: var(--accent-soft); border-color: var(--accent); }
</style>

<!-- QR 產生器：本地函式庫，不依賴外部網站 -->
<script src="qr-code-styling.js"></script>
<!-- 相機掃描 QR：本地函式庫，不依賴外部網站 -->
<script src="html5-qrcode.min.js"></script>
</head>

<body>
  <div class="wrap">
    <header>
      <p class="eyebrow">Home Desyne · Design by Stone_Code</p>
      <h1>捷安庫存查詢</h1>
      <p class="sub">輸入商品編號，即時查詢名稱與庫存數量。</p>
    </header>

    <div class="search">
      <input id="code" type="text" placeholder="輸入商品編號…"
             autocomplete="off" autofocus inputmode="search" />
      <button id="go">查詢</button>
      <button id="scanBtn" class="scan-btn" title="掃描 QR" aria-label="掃描 QR">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 8V5a2 2 0 0 1 2-2h3"/>
          <path d="M21 8V5a2 2 0 0 0-2-2h-3"/>
          <path d="M3 16v3a2 2 0 0 0 2 2h3"/>
          <path d="M21 16v3a2 2 0 0 1-2 2h-3"/>
          <rect x="7.5" y="7.5" width="9" height="9" rx="1.5"/>
        </svg>
      </button>
    </div>

    <div id="qrArea"></div>

    <div class="panel" id="panel">
      <div class="state empty">
        <div class="icon">🔎</div>
        <div class="big">尚未查詢</div>
        <div>在上方輸入編號後按查詢或 Enter</div>
      </div>
    </div>

    <footer>資料來源：Ragic · 庫存以系統即時數字為準 </footer>
  </div>

  <!-- 掃描彈窗 -->
  <div id="scanModal" class="scan-modal" aria-hidden="true">
    <div class="scan-sheet">
      <div class="scan-head">
        <span>掃描商品 QR</span>
        <button id="scanClose" class="scan-close" aria-label="關閉">✕</button>
      </div>
      <div id="reader" class="scan-reader"></div>
      <div id="scanStatus" class="scan-status">啟動相機中…</div>
      <button id="scanManual" class="scan-manual">改用手動輸入</button>
    </div>
  </div>

<script>
  const input  = document.getElementById('code');
  const btn    = document.getElementById('go');
  const panel  = document.getElementById('panel');
  const qrArea = document.getElementById('qrArea');

  // 部署在 Vercel 時，前端與 API 同網域，這裡留空字串即可。
  // 若前端另放在別的網域（例如 GitHub Pages），填你的 Vercel 網址：
  //   const BACKEND_URL = "https://你的專案.vercel.app";
  const BACKEND_URL = "";

  // QR 碼中間的固定 LOGO 圖：放在主目錄的檔名（可改成 logo.png 等）。
  const LOGO_URL = "logo.png";

  const LOW_STOCK = 5; // 低於此數量標示提醒，可自行調整

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // 網址型（Shopline 等）直接用；Ragic 內部檔案才經後端代理
  function imageSrc(v) {
    return /^https?:\/\//i.test(v)
      ? v
      : BACKEND_URL + '/api/image?f=' + encodeURIComponent(v);
  }

  function showLoading() {
    panel.innerHTML = `<div class="state"><div class="spinner"></div><div>查詢中…</div></div>`;
  }

  function showEmpty(code) {
    panel.innerHTML = `<div class="state empty">
      <div class="icon">∅</div>
      <div class="big">查無此編號</div>
      <div>找不到「${esc(code)}」，請確認編號是否正確</div>
    </div>`;
  }

  function showError(msg) {
    panel.innerHTML = `<div class="state error">
      <div class="icon">!</div>
      <div class="big">查詢失敗</div>
      <div>${esc(msg)}</div>
    </div>`;
  }

  function clearQR() { qrArea.innerHTML = ''; }

  let qrInstance = null;

  function renderQR(code) {
    qrArea.innerHTML = `<div class="qr-card">
      <div id="qrBox" class="qr-box"></div>
      <div class="qr-label">${esc(code)}</div>
      <button id="qrDownload" class="qr-dl">下載 QR 圖</button>
    </div>`;

    if (typeof QRCodeStyling === 'undefined') { return; } // 函式庫未載入時安全略過

    // qr-code-styling：LOGO 底下的碼點會自動空出（hideBackgroundDots），
    // 搭配最高容錯等級 H，掃描更穩。
    qrInstance = new QRCodeStyling({
      width: 600, height: 600, type: "canvas",
      data: code,
      image: LOGO_URL,
      margin: 0,
      qrOptions: { errorCorrectionLevel: "H" },
      dotsOptions: { color: "#262a2c", type: "rounded" },
      backgroundOptions: { color: "#ffffff" },
      cornersSquareOptions: { color: "#35635a", type: "extra-rounded" },
      cornersDotOptions: { color: "#35635a" },
      imageOptions: {
        crossOrigin: "anonymous",
        hideBackgroundDots: true,
        imageSize: 0.28,
        margin: 8,
      },
    });
    qrInstance.append(document.getElementById('qrBox'));

    document.getElementById('qrDownload').addEventListener('click', () => {
      qrInstance.download({ name: code || 'qrcode', extension: 'png' });
    });
  }

  function qtyClass(qty) {
    const n = parseFloat(String(qty).replace(/[^0-9.\-]/g, ''));
    if (!isNaN(n)) {
      if (n <= 0) return 'zero';
      if (n < LOW_STOCK) return 'low';
    }
    return '';
  }

  // 把庫存字串解析成數字（取不到就當 0）
  function toQtyNum(v) {
    const n = parseFloat(String(v == null ? '' : v).replace(/[^0-9.\-]/g, ''));
    return isNaN(n) ? 0 : n;
  }

  function showResult(data) {
    const r = data.result;

    let multi = '';
    if (data.all && data.all.length > 1) {
      multi = `<div class="multi"><b>注意：</b>有 ${data.all.length} 筆相同編號的資料，以下編修只會套用到第一筆：<ul>` +
        data.all.map(x => `<li>${esc(x.name)} — 庫存 ${esc(x.qty)}</li>`).join('') +
        `</ul></div>`;
    }

    let imgBlock = '';
    if (r.image) {
      const src = imageSrc(r.image);
      imgBlock = `<div class="r-img"><img src="${esc(src)}" alt="${esc(r.name)}"
        onerror="this.closest('.r-img').remove()" /></div>`;
    }

    panel.innerHTML = `<div class="result">
      ${imgBlock}
      <div class="r-head">
        <span class="r-code">${esc(r.code)}</span>
        <span id="stockTag"></span>
      </div>
      <div class="r-name">${esc(r.name) || '（無名稱）'}</div>

      <div class="qty-editor">
        <div class="r-qtyrow">
          <span class="r-qty" id="qtyNow">—</span>
          <span class="r-unit">庫存數量</span>
        </div>

        <div class="stepper">
          <button type="button" class="minus" data-d="-10">−10</button>
          <button type="button" class="minus" data-d="-1">−1</button>
          <button type="button" data-d="1">＋1</button>
          <button type="button" data-d="10">＋10</button>
        </div>

        <div class="change-note" id="changeNote"></div>

        <div class="save-row" id="saveRow">
          <button type="button" class="save-btn" id="saveBtn">存檔</button>
          <button type="button" class="reset-btn" id="resetBtn">還原</button>
        </div>

        <div class="save-confirm" id="saveConfirm">
          <div class="msg" id="saveConfirmMsg"></div>
          <div class="save-confirm-row">
            <button type="button" class="confirm-yes" id="confirmYes">確定存檔</button>
            <button type="button" class="confirm-no"  id="confirmNo">取消</button>
          </div>
        </div>

        <div class="save-status" id="saveStatus"></div>
      </div>

      ${multi}
    </div>`;

    mountQtyEditor(r.code, toQtyNum(r.qty));
  }

  /* ── 庫存加減 + 存檔 ─────────────────────
     · ＋1／＋10／−1／−10 調整「待存數量」
     · 顯示「原本 X → 調整後 Y」，並提醒是否存檔
     · 按存檔會再跳一次確認，確定後才寫回 Ragic
  */
  function mountQtyEditor(code, origQty) {
    let orig    = origQty;   // 目前資料庫裡的數字
    let pending = origQty;   // 加減後、尚未存檔的數字

    const qtyNow      = document.getElementById('qtyNow');
    const stockTag    = document.getElementById('stockTag');
    const changeNote  = document.getElementById('changeNote');
    const saveRow     = document.getElementById('saveRow');
    const saveBtn     = document.getElementById('saveBtn');
    const resetBtn    = document.getElementById('resetBtn');
    const saveConfirm = document.getElementById('saveConfirm');
    const confirmMsg  = document.getElementById('saveConfirmMsg');
    const confirmYes  = document.getElementById('confirmYes');
    const confirmNo   = document.getElementById('confirmNo');
    const saveStatus  = document.getElementById('saveStatus');

    function tagFor(n) {
      if (n <= 0)         return { cls: 'zero', text: '缺貨' };
      if (n < LOW_STOCK)  return { cls: 'low',  text: '低庫存' };
      return null;
    }

    function render() {
      // 大數字 + 顏色
      const t = tagFor(pending);
      qtyNow.textContent = pending;
      qtyNow.className = 'r-qty' + (t ? ' ' + t.cls : '');
      stockTag.innerHTML = t ? `<span class="tag ${t.cls}">${t.text}</span>` : '';

      const diff = pending - orig;
      if (diff === 0) {
        changeNote.classList.remove('show');
        saveRow.classList.remove('show');
      } else {
        const dir = diff > 0 ? 'up' : 'down';
        const sign = diff > 0 ? '＋' : '−';
        changeNote.innerHTML =
          `庫存將從 <span class="from">${orig}</span>` +
          `<span class="arrow">→</span>` +
          `<span class="to ${dir}">${pending}</span>` +
          `<span class="delta ${dir === 'up' ? '' : ''}">（${sign}${Math.abs(diff)}）</span>` +
          `　尚未存檔`;
        changeNote.classList.add('show');
        saveRow.classList.add('show');
      }
      // 有調整才可存檔
      saveBtn.disabled = (diff === 0);
    }

    function adjust(d) {
      pending = Math.max(0, pending + d);   // 庫存不低於 0
      // 一旦重新調整，關掉先前的確認框與舊狀態
      saveConfirm.classList.remove('show');
      saveStatus.classList.remove('show', 'ok', 'err');
      render();
    }

    function resetPending() {
      pending = orig;
      saveConfirm.classList.remove('show');
      saveStatus.classList.remove('show', 'ok', 'err');
      render();
    }

    // 加減按鈕
    document.querySelectorAll('.stepper button').forEach(b => {
      b.addEventListener('click', () => adjust(parseInt(b.dataset.d, 10)));
    });
    resetBtn.addEventListener('click', resetPending);

    // 按「存檔」→ 先跳確認提醒
    saveBtn.addEventListener('click', () => {
      if (pending === orig) return;
      confirmMsg.innerHTML =
        `確定要把「${esc(code)}」的庫存<br>` +
        `從 <b>${orig}</b> 變更為 <b>${pending}</b>，並存回 Ragic 嗎？`;
      saveConfirm.classList.add('show');
      saveStatus.classList.remove('show', 'ok', 'err');
    });

    confirmNo.addEventListener('click', () => saveConfirm.classList.remove('show'));

    // 確定存檔 → 寫回 Ragic
    confirmYes.addEventListener('click', async () => {
      const target = pending;
      confirmYes.disabled = true;
      confirmYes.textContent = '存檔中…';
      try {
        const res = await fetch(BACKEND_URL + '/api/update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: code, qty: target })
        });
        const out = await res.json().catch(() => ({}));
        if (!res.ok || out.ok === false) {
          throw new Error(out.error || out.detail || ('HTTP ' + res.status));
        }
        // 成功：把「原本」更新成剛存檔的數字
        orig = (out.qty != null && !isNaN(toQtyNum(out.qty))) ? toQtyNum(out.qty) : target;
        pending = orig;
        saveConfirm.classList.remove('show');
        render();
        saveStatus.textContent = '✓ 已存檔，庫存已更新為 ' + orig;
        saveStatus.className = 'save-status show ok';
      } catch (e) {
        saveConfirm.classList.remove('show');
        saveStatus.textContent = '存檔失敗：' + (e.message || '無法連線到伺服器') + '（庫存未變更）';
        saveStatus.className = 'save-status show err';
      } finally {
        confirmYes.disabled = false;
        confirmYes.textContent = '確定存檔';
      }
    });

    render();
  }

  async function lookup() {
    const code = input.value.trim();
    if (!code) { input.focus(); return; }
    btn.disabled = true;
    clearQR();
    showLoading();

    try {
      const res = await fetch(BACKEND_URL + '/api/lookup?code=' + encodeURIComponent(code));
      if (res.status === 404) { showEmpty(code); return; }
      const data = await res.json();
      if (!res.ok) { showError(data.error || data.detail || ('HTTP ' + res.status)); return; }
      if (!data.found) { showEmpty(code); return; }
      showResult(data);
      renderQR(data.result.code);
    } catch (e) {
      showError('無法連線到伺服器');
    } finally {
      btn.disabled = false;
    }
  }

  btn.addEventListener('click', lookup);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') lookup(); });

  /* ── 相機掃描 QR ─────────────────────────
     用 html5-qrcode 處理 iOS/Android 各瀏覽器差異與相機權限。
     注意：相機需在 HTTPS（或 localhost）下才能使用；Vercel 網址是 https，沒問題。
  */
  const scanModal  = document.getElementById('scanModal');
  const scanBtn    = document.getElementById('scanBtn');
  const scanClose  = document.getElementById('scanClose');
  const scanManual = document.getElementById('scanManual');
  let html5Qr = null;
  let scanHandled = false;

  function setScanStatus(msg, isErr) {
    const el = document.getElementById('scanStatus');
    if (el) { el.textContent = msg; el.classList.toggle('err', !!isErr); }
  }

  // 掃到的內容若是網址，嘗試取出 code 參數或最後一段；否則原樣當編號
  function parseScanned(text) {
    text = String(text).trim();
    if (/^https?:\/\//i.test(text)) {
      try {
        const u = new URL(text);
        const c = u.searchParams.get('code') || u.searchParams.get('q');
        if (c) return c.trim();
        const seg = u.pathname.split('/').filter(Boolean).pop();
        if (seg) return decodeURIComponent(seg);
      } catch (_) {}
    }
    return text;
  }

  async function stopScanner() {
    if (html5Qr) {
      try { await html5Qr.stop(); } catch (_) {}
      try { html5Qr.clear(); } catch (_) {}
      html5Qr = null;
    }
  }

  function closeScannerUI() {
    scanModal.classList.remove('open');
    scanModal.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
  }

  async function closeScanner() {
    await stopScanner();
    closeScannerUI();
  }

  function handleCamError(err) {
    const name = (err && err.name) || '';
    const secure = location.protocol === 'https:' || location.hostname === 'localhost';
    let msg;
    if (!secure) {
      msg = '相機需要 HTTPS 才能使用。請用正式的 https 網址開啟。';
    } else if (name === 'NotAllowedError' || /permission|denied/i.test(String(err))) {
      msg = '相機權限被拒。iPhone：設定 → Safari →（或該瀏覽器）相機，允許本網站；' +
            'Android：點網址列左側鎖頭 → 權限 → 相機，允許後再試。';
    } else if (name === 'NotFoundError' || name === 'DevicesNotFoundError') {
      msg = '找不到相機裝置。';
    } else if (name === 'NotReadableError' || name === 'TrackStartError') {
      msg = '相機被其他 App 占用，請先關閉其他使用相機的程式再試。';
    } else {
      msg = '無法啟動相機：' + (err && err.message ? err.message : '未知錯誤') +
            '。若是在 LINE／FB 內開啟，請改用 Safari 或 Chrome 開啟本頁。';
    }
    setScanStatus(msg, true);
  }

  function onScanSuccess(decodedText) {
    if (scanHandled) return;      // 只處理第一次成功
    scanHandled = true;
    const code = parseScanned(decodedText);
    stopScanner().finally(() => {
      closeScannerUI();
      input.value = code;
      lookup();                    // 回到主頁，顯示該商品資料
    });
  }

  async function openScanner() {
    if (typeof Html5Qrcode === 'undefined') {
      scanModal.classList.add('open');
      setScanStatus('掃描元件未載入，請重新整理頁面再試。', true);
      return;
    }
    scanHandled = false;
    scanModal.classList.add('open');
    scanModal.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
    setScanStatus('啟動相機中…');

    html5Qr = new Html5Qrcode('reader', { verbose: false });
    const config = { fps: 12, qrbox: { width: 230, height: 230 }, aspectRatio: 1.0 };
    try {
      // 優先用後鏡頭
      await html5Qr.start({ facingMode: 'environment' }, config, onScanSuccess);
      setScanStatus('將商品 QR 對準框內');
    } catch (err) {
      try {
        // 後鏡頭失敗（如筆電）→ 退而用任一鏡頭
        await html5Qr.start({ facingMode: 'user' }, config, onScanSuccess);
        setScanStatus('將商品 QR 對準框內');
      } catch (err2) {
        handleCamError(err2 || err);
      }
    }
  }

  scanBtn.addEventListener('click', openScanner);
  scanClose.addEventListener('click', closeScanner);
  scanManual.addEventListener('click', () => { closeScanner(); input.focus(); });
  scanModal.addEventListener('click', e => { if (e.target === scanModal) closeScanner(); });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && scanModal.classList.contains('open')) closeScanner();
  });
</script>
</body>
</html>
