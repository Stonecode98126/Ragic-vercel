<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>商品庫存查詢 · Home Desyne</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@500;600;700&display=swap" rel="stylesheet" />

<style>
  :root {
    /* 暖調中性底色，貼近 Home Desyne 溫潤質感 */
    --paper:        #efece5;
    --paper-2:      #f6f4ef;
    --ink:          #262a2c;
    --muted:        #8b857b;
    --line:         rgba(38, 42, 44, 0.10);
    --line-strong:  rgba(38, 42, 44, 0.16);

    --accent:       #35635a;   /* 沉靜墨綠 */
    --accent-dark:  #274a43;
    --accent-soft:  rgba(53, 99, 90, 0.10);

    --warn:         #b0791f;   /* 低庫存 · 琥珀 */
    --warn-soft:    #f4ecdb;
    --danger:       #a3493d;   /* 缺貨 · 磚紅 */
    --danger-soft:  #f2e2df;

    /* 磨砂玻璃 */
    --glass:        rgba(255, 255, 255, 0.55);
    --glass-strong: rgba(255, 255, 255, 0.74);
    --glass-line:   rgba(255, 255, 255, 0.65);
    --blur:         18px;
    --shadow:       0 18px 48px -22px rgba(38, 42, 44, 0.32);

    --mono: ui-monospace, "SF Mono", "Roboto Mono", "Noto Sans Mono", monospace;
    --sans: "Noto Sans TC", -apple-system, "Segoe UI", system-ui, sans-serif;
    --serif: "Noto Serif TC", "Songti TC", Georgia, serif;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; }

  body {
    font-family: var(--sans);
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 18px 72px;
    -webkit-font-smoothing: antialiased;
    position: relative;
    overflow-x: hidden;
  }

  /* 柔和背景光暈 + 織品直紋，讓磨砂玻璃有內容可透 */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: -2;
    background:
      radial-gradient(60% 45% at 18% 8%,  rgba(53, 99, 90, 0.14), transparent 70%),
      radial-gradient(55% 40% at 92% 22%, rgba(176, 121, 31, 0.12), transparent 70%),
      radial-gradient(70% 55% at 50% 108%, rgba(53, 99, 90, 0.10), transparent 70%),
      var(--paper);
  }
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    z-index: -1;
    background-image: repeating-linear-gradient(
      90deg,
      rgba(38, 42, 44, 0.018) 0px,
      rgba(38, 42, 44, 0.018) 1px,
      transparent 1px,
      transparent 7px
    );
    pointer-events: none;
  }

  .wrap { width: 100%; max-width: 540px; }

  /* ── 標題 ─────────────────────────────── */
  header {
    margin-bottom: 26px;
    animation: rise .6s cubic-bezier(.22,.61,.36,1) both;
  }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--sans);
    font-size: 11.5px; letter-spacing: 0.26em; text-transform: uppercase;
    color: var(--accent); font-weight: 700; margin: 0 0 12px;
  }
  .eyebrow::before {
    content: ""; width: 22px; height: 1.5px;
    background: currentColor; border-radius: 2px; opacity: .7;
  }
  h1 {
    font-family: var(--serif);
    font-size: 30px; margin: 0; font-weight: 700;
    letter-spacing: 0.01em; line-height: 1.2;
  }
  .sub { color: var(--muted); font-size: 14.5px; margin: 10px 0 0; line-height: 1.6; }

  /* ── 搜尋列 ───────────────────────────── */
  .search {
    display: flex; gap: 10px; margin-bottom: 22px;
    animation: rise .6s cubic-bezier(.22,.61,.36,1) .06s both;
  }
  .search input {
    flex: 1; font-family: var(--mono); font-size: 17px;
    padding: 15px 18px;
    border: 1px solid var(--glass-line);
    border-radius: 14px;
    background: var(--glass-strong);
    -webkit-backdrop-filter: blur(var(--blur));
    backdrop-filter: blur(var(--blur));
    color: var(--ink); outline: none;
    box-shadow: var(--shadow);
    transition: border-color .18s, box-shadow .18s, transform .18s;
  }
  .search input::placeholder { color: var(--muted); font-family: var(--sans); }
  .search input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft), var(--shadow);
  }
  .search button {
    font-family: var(--sans); font-size: 15px; font-weight: 700;
    letter-spacing: .04em;
    padding: 0 26px; border: none; border-radius: 14px;
    background: var(--accent); color: #fff; cursor: pointer;
    box-shadow: 0 12px 26px -12px rgba(53, 99, 90, 0.7);
    transition: background .18s, transform .12s, box-shadow .18s;
  }
  .search button:hover { background: var(--accent-dark); transform: translateY(-1px); }
  .search button:active { transform: translateY(0); }
  .search button:disabled { opacity: .5; cursor: default; transform: none; }

  /* ── QR 區塊 ──────────────────────────── */
  #qrArea:not(:empty) { margin-bottom: 22px; }
  .qr-card {
    background: var(--glass);
    -webkit-backdrop-filter: blur(var(--blur));
    backdrop-filter: blur(var(--blur));
    border: 1px solid var(--glass-line);
    border-radius: 20px;
    box-shadow: var(--shadow);
    padding: 22px;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    animation: qrIn .55s cubic-bezier(.22,.61,.36,1) both;
  }
  .qr-box {
    width: 220px; height: 220px;
    padding: 14px; border-radius: 16px;
    background: #fff;
    box-shadow: inset 0 0 0 1px var(--line);
  }
  .qr-box canvas, .qr-box svg {
    width: 220px !important; height: 220px !important;
    border-radius: 8px; background: #fff; display: block;
  }
  .qr-label {
    font-family: var(--mono); font-size: 13px; color: var(--muted);
    letter-spacing: .02em; text-align: center; word-break: break-all;
  }
  .qr-dl {
    font-family: var(--sans); font-size: 13px; font-weight: 700;
    letter-spacing: .03em;
    color: var(--accent); background: rgba(255,255,255,0.5);
    border: 1px solid var(--line-strong); border-radius: 11px;
    padding: 10px 20px; cursor: pointer;
    transition: border-color .18s, color .18s, background .18s, transform .12s;
  }
  .qr-dl:hover { border-color: var(--accent); background: var(--accent-soft); transform: translateY(-1px); }

  /* ── 結果面板 ─────────────────────────── */
  .panel {
    background: var(--glass);
    -webkit-backdrop-filter: blur(var(--blur));
    backdrop-filter: blur(var(--blur));
    border: 1px solid var(--glass-line);
    border-radius: 22px;
    box-shadow: var(--shadow);
    overflow: hidden;
    min-height: 132px;
  }

  .result { padding: 0; animation: rise .5s cubic-bezier(.22,.61,.36,1) both; }
  .result > * { animation: rise .5s cubic-bezier(.22,.61,.36,1) both; }
  .result > *:nth-child(1) { animation-delay: .02s; }
  .result > *:nth-child(2) { animation-delay: .08s; }
  .result > *:nth-child(3) { animation-delay: .13s; }
  .result > *:nth-child(4) { animation-delay: .18s; }
  .result > *:nth-child(5) { animation-delay: .23s; }

  .r-img {
    width: 100%;
    background: linear-gradient(160deg, #f3f1ec, #e9e6df);
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    min-height: 200px; max-height: 320px; overflow: hidden;
  }
  .r-img img {
    width: 100%; height: 100%; max-height: 320px;
    object-fit: contain; display: block;
  }
  .r-head {
    padding: 20px 24px 0;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .r-code {
    font-family: var(--mono); font-size: 14px; color: var(--muted);
    letter-spacing: 0.04em;
    padding: 5px 12px; border-radius: 999px;
    background: rgba(38,42,44,0.05);
  }
  .r-name {
    font-family: var(--serif);
    font-size: 23px; font-weight: 700; line-height: 1.35;
    padding: 16px 24px 2px; letter-spacing: .01em;
  }
  .r-qtyrow {
    display: flex; align-items: baseline; gap: 12px; padding: 8px 24px 26px;
  }
  .r-qty {
    font-family: var(--mono); font-size: 48px; font-weight: 700;
    line-height: 1; letter-spacing: -0.02em;
  }
  .r-qty.low  { color: var(--warn); }
  .r-qty.zero { color: var(--danger); }
  .r-unit { color: var(--muted); font-size: 15px; }

  .tag {
    font-size: 11px; font-weight: 700; letter-spacing: .1em;
    padding: 6px 12px; border-radius: 999px; align-self: center;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .tag::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .tag.low  { background: var(--warn-soft);  color: var(--warn); }
  .tag.zero { background: var(--danger-soft); color: var(--danger); }

  /* ── 狀態 (空 / 載入 / 錯誤) ──────────── */
  .state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 46px 24px; color: var(--muted);
    min-height: 132px; gap: 10px;
    animation: rise .45s cubic-bezier(.22,.61,.36,1) both;
  }
  .state .big { font-size: 15.5px; color: var(--ink); font-weight: 700; }
  .state .icon {
    font-size: 26px; opacity: .55; font-weight: 300;
    width: 54px; height: 54px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: rgba(38,42,44,0.05); margin-bottom: 2px;
  }
  .state.error { color: var(--danger); }
  .state.error .big { color: var(--danger); }
  .state.error .icon { background: var(--danger-soft); color: var(--danger); opacity: 1; }

  .spinner {
    width: 26px; height: 26px; border: 2.5px solid var(--line-strong);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .7s linear infinite;
  }

  /* ── 多筆提醒 ─────────────────────────── */
  .multi {
    border-top: 1px solid var(--line); padding: 16px 24px 20px;
    font-size: 13px; color: var(--muted); line-height: 1.7;
    background: rgba(176, 121, 31, 0.05);
  }
  .multi b { color: var(--warn); }
  .multi ul { margin: 8px 0 0; padding-left: 18px; }
  .multi li { margin: 4px 0; font-family: var(--mono); color: var(--ink); }

  footer {
    margin-top: 22px; font-size: 12px; color: var(--muted); text-align: center;
    letter-spacing: .02em;
    animation: rise .6s cubic-bezier(.22,.61,.36,1) .12s both;
  }

  /* ── 動畫 ─────────────────────────────── */
  @keyframes rise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
  @keyframes qrIn { from { opacity: 0; transform: translateY(14px) scale(.97); } to { opacity: 1; transform: none; } }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .001s !important; }
    .spinner { animation: spin .7s linear infinite !important; }
  }

  @media (max-width: 480px) {
    body { padding: 28px 14px 56px; }
    h1 { font-size: 26px; }
    .search input { font-size: 16px; }
  }
</style>

<!-- QR 產生器：改用 CDN，預覽與正式部署都可用。
     若你要沿用專案內的本機檔，把下一行換回 <script src="qr-code-styling.js"></script> 即可。 -->
<script src="https://unpkg.com/qr-code-styling@1.6.0-rc.1/lib/qr-code-styling.js"></script>
</head>

<body>
  <div class="wrap">
    <header>
      <p class="eyebrow">Home Desyne · 庫存</p>
      <h1>商品庫存查詢</h1>
      <p class="sub">輸入商品編號，即時查詢名稱與庫存數量。</p>
    </header>

    <div class="search">
      <input id="code" type="text" placeholder="輸入商品編號…"
             autocomplete="off" autofocus inputmode="search" />
      <button id="go">查詢</button>
    </div>

    <div id="qrArea"></div>

    <div class="panel" id="panel">
      <div class="state empty">
        <div class="icon">🔎</div>
        <div class="big">尚未查詢</div>
        <div>在上方輸入編號後按查詢或 Enter</div>
      </div>
    </div>

    <footer>資料來源：Ragic · 庫存以系統即時數字為準</footer>
  </div>

<script>
  const input  = document.getElementById('code');
  const btn    = document.getElementById('go');
  const panel  = document.getElementById('panel');
  const qrArea = document.getElementById('qrArea');

  // 部署在 Vercel 時，前端與 API 同網域，這裡留空字串即可。
  // 若前端另放在別的網域（例如 GitHub Pages），填你的 Vercel 網址：
  //   const BACKEND_URL = "https://你的專案.vercel.app";
  const BACKEND_URL = "";

  // QR 碼中間的固定 LOGO 圖：放在主目錄的檔名（可改成 logo.png 等）。
  const LOGO_URL = "logo.png";

  const LOW_STOCK = 5; // 低於此數量標示提醒，可自行調整

  // ⚠️ 展示用假資料：讓你在本機／預覽直接看到成品外觀。
  //    正式部署請把 DEMO 改成 false，就會改打真正的 /api/lookup。
  const DEMO = true;

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // 網址型（Shopline 等）直接用；Ragic 內部檔案才經後端代理
  function imageSrc(v) {
    return /^https?:\/\//i.test(v)
      ? v
      : BACKEND_URL + '/api/image?f=' + encodeURIComponent(v);
  }

  function showLoading() {
    panel.innerHTML = `<div class="state"><div class="spinner"></div><div>查詢中…</div></div>`;
  }

  function showEmpty(code) {
    panel.innerHTML = `<div class="state empty">
      <div class="icon">∅</div>
      <div class="big">查無此編號</div>
      <div>找不到「${esc(code)}」，請確認編號是否正確</div>
    </div>`;
  }

  function showError(msg) {
    panel.innerHTML = `<div class="state error">
      <div class="icon">!</div>
      <div class="big">查詢失敗</div>
      <div>${esc(msg)}</div>
    </div>`;
  }

  function clearQR() { qrArea.innerHTML = ''; }

  let qrInstance = null;

  function renderQR(code) {
    qrArea.innerHTML = `<div class="qr-card">
      <div id="qrBox" class="qr-box"></div>
      <div class="qr-label">${esc(code)}</div>
      <button id="qrDownload" class="qr-dl">下載 QR 圖</button>
    </div>`;

    if (typeof QRCodeStyling === 'undefined') { return; } // 函式庫未載入時安全略過

    // qr-code-styling：LOGO 底下的碼點會自動空出（hideBackgroundDots），
    // 搭配最高容錯等級 H，掃描更穩。
    qrInstance = new QRCodeStyling({
      width: 600, height: 600, type: "canvas",
      data: code,
      image: LOGO_URL,
      margin: 0,
      qrOptions: { errorCorrectionLevel: "H" },
      dotsOptions: { color: "#262a2c", type: "rounded" },
      backgroundOptions: { color: "#ffffff" },
      cornersSquareOptions: { color: "#35635a", type: "extra-rounded" },
      cornersDotOptions: { color: "#35635a" },
      imageOptions: {
        crossOrigin: "anonymous",
        hideBackgroundDots: true,
        imageSize: 0.28,
        margin: 8,
      },
    });
    qrInstance.append(document.getElementById('qrBox'));

    document.getElementById('qrDownload').addEventListener('click', () => {
      qrInstance.download({ name: code || 'qrcode', extension: 'png' });
    });
  }

  function qtyClass(qty) {
    const n = parseFloat(String(qty).replace(/[^0-9.\-]/g, ''));
    if (!isNaN(n)) {
      if (n <= 0) return 'zero';
      if (n < LOW_STOCK) return 'low';
    }
    return '';
  }

  function showResult(data) {
    const r = data.result;
    const cls = qtyClass(r.qty);
    const tag = cls === 'zero'
      ? '<span class="tag zero">缺貨</span>'
      : cls === 'low' ? '<span class="tag low">低庫存</span>' : '';

    let multi = '';
    if (data.all && data.all.length > 1) {
      multi = `<div class="multi"><b>注意：</b>有 ${data.all.length} 筆相同編號的資料：<ul>` +
        data.all.map(x => `<li>${esc(x.name)} — 庫存 ${esc(x.qty)}</li>`).join('') +
        `</ul></div>`;
    }

    let imgBlock = '';
    if (r.image) {
      const src = imageSrc(r.image);
      imgBlock = `<div class="r-img"><img src="${esc(src)}" alt="${esc(r.name)}"
        onerror="this.closest('.r-img').remove()" /></div>`;
    }

    panel.innerHTML = `<div class="result">
      ${imgBlock}
      <div class="r-head">
        <span class="r-code">${esc(r.code)}</span>
        ${tag}
      </div>
      <div class="r-name">${esc(r.name) || '（無名稱）'}</div>
      <div class="r-qtyrow">
        <span class="r-qty ${cls}">${esc(r.qty) || '—'}</span>
        <span class="r-unit">庫存數量</span>
      </div>
      ${multi}
    </div>`;
  }

  // 展示用假資料
  function demoData(code) {
    const samples = {
      'A-1024': { code: 'A-1024', name: '捷安隔間片簾 60×5 亞麻白', qty: '38',
                  image: 'https://img.shoplineapp.com/media/image_clips/682da26479311800108ca4d6/original.jpg?1747821156' },
      'B-2210': { code: 'B-2210', name: '木紋伸縮窗簾桿 25.4mm 胡桃', qty: '3', image: '' },
      'C-0001': { code: 'C-0001', name: '遮光窗簾 霧灰 130×160', qty: '0', image: '' },
    };
    const r = samples[code.toUpperCase()] || { code: code, name: '示範商品 ' + code, qty: '17', image: '' };
    return { found: true, result: r, all: [r] };
  }

  async function lookup() {
    const code = input.value.trim();
    if (!code) { input.focus(); return; }
    btn.disabled = true;
    clearQR();
    showLoading();

    if (DEMO) {
      setTimeout(() => {
        const data = demoData(code);
        showResult(data);
        renderQR(data.result.code);
        btn.disabled = false;
      }, 550);
      return;
    }

    try {
      const res = await fetch(BACKEND_URL + '/api/lookup?code=' + encodeURIComponent(code));
      if (res.status === 404) { showEmpty(code); return; }
      const data = await res.json();
      if (!res.ok) { showError(data.error || data.detail || ('HTTP ' + res.status)); return; }
      if (!data.found) { showEmpty(code); return; }
      showResult(data);
      renderQR(data.result.code);
    } catch (e) {
      showError('無法連線到伺服器');
    } finally {
      btn.disabled = false;
    }
  }

  btn.addEventListener('click', lookup);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') lookup(); });
</script>
</body>
</html>
